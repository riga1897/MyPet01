version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_URL=postgres://mypet_user:mypet_password@db:5432/mypet_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CACHE_BACKEND=locmem
      - BROWSER_CACHE_ENABLED=False
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mypet_db
      - POSTGRES_USER=mypet_user
      - POSTGRES_PASSWORD=mypet_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mypet_user -d mypet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume:
