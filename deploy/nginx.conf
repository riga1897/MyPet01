upstream blog_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name www.mine-craft.su site.mine-craft.su;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.mine-craft.su site.mine-craft.su;
    
    ssl_certificate /etc/letsencrypt/live/mine-craft.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mine-craft.su/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    client_max_body_size 100M;
    
    access_log /var/log/nginx/blog-access.log;
    error_log /var/log/nginx/blog-error.log;
    
    location /static/ {
        alias /var/www/blog/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }
    
    location /media/ {
        internal;
        alias /var/www/blog/media/;
    }
    
    location / {
        proxy_pass http://blog_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    location /favicon.ico {
        alias /var/www/blog/staticfiles/favicon.png;
        expires 30d;
        access_log off;
    }
    
    location /robots.txt {
        alias /var/www/blog/staticfiles/robots.txt;
        expires 7d;
        access_log off;
    }
}
