global
    log stdout format raw local0
    maxconn 4096
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    retries 3

# ============================================================
# Stick-tables for rate limiting (defined as backends)
# ============================================================

backend st_tcp_rates
    stick-table type ip size 200k expire 5m store conn_rate(10s),conn_cur,gpc0

backend st_http_rates
    stick-table type ip size 200k expire 30m store http_req_rate(10s),http_err_rate(10s),gpc0,conn_rate(10s)

# ============================================================
# Frontend: SSL/TLS (port 443) — SNI routing
# ============================================================

frontend ft_ssl
    bind *:443
    mode tcp
    option tcplog

    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    # --- Manual IP blacklist (checked FIRST, before everything else) ---
    acl is_blacklisted src -f /usr/local/etc/haproxy/blacklist/blocked_ips.lst
    tcp-request connection reject if is_blacklisted

    # --- Rate limiting ---
    tcp-request connection track-sc0 src table st_tcp_rates

    acl tcp_conn_rate_abuse sc0_conn_rate(st_tcp_rates) gt 30
    acl tcp_conn_cur_abuse sc0_conn_cur(st_tcp_rates) gt 20

    tcp-request connection reject if tcp_conn_rate_abuse
    tcp-request connection reject if tcp_conn_cur_abuse

    # --- SNI detection ---
    acl is_vpn req_ssl_sni -i vpn.mine-craft.su
    acl is_vpn req_ssl_sni -i mainsrv01.mine-craft.su
    acl is_web req_ssl_sni -i www.mine-craft.su
    acl is_site req_ssl_sni -i site.mine-craft.su
    acl is_mine_craft_su req_ssl_sni -i mine-craft.su

    # --- GeoIP filtering ---
    acl is_russian_ip src -f /usr/local/etc/haproxy/geoip/ru_networks.lst

    # VPN: allow from anywhere, route immediately
    use_backend bk_vpn if is_vpn

    # Web/site: only Russian IPs
    tcp-request content reject if is_web !is_russian_ip
    tcp-request content reject if is_site !is_russian_ip
    tcp-request content reject if is_mine_craft_su !is_russian_ip

    # Reject unknown SNI from non-Russian IPs (catches scanners with random SNI)
    tcp-request content reject if !is_vpn !is_web !is_site !is_mine_craft_su !is_russian_ip

    use_backend bk_web if is_web
    use_backend bk_web if is_site
    use_backend bk_web if is_mine_craft_su

    default_backend bk_web

# ============================================================
# Frontend: HTTP (port 80) — redirect + ACME + scanner blocking
# ============================================================

frontend ft_http
    bind *:80
    mode http
    option httplog

    # --- ACME challenges: define ACL first ---
    acl is_acme path_beg /.well-known/acme-challenge/

    # --- Manual IP blacklist (checked FIRST after ACME, ACME exempt) ---
    acl is_blacklisted_http src -f /usr/local/etc/haproxy/blacklist/blocked_ips.lst
    http-request deny deny_status 403 if !is_acme is_blacklisted_http

    # --- Rate limiting (skip tracking for ACME) ---
    http-request track-sc1 src table st_http_rates if !is_acme

    # --- GeoIP filtering for HTTP (ACME exempt) ---
    acl is_russian_ip_http src -f /usr/local/etc/haproxy/geoip/ru_networks.lst
    http-request deny deny_status 403 if !is_acme !is_russian_ip_http

    # --- Auto-ban: if IP marked as abuser (gpc0 > 0), deny (ACME exempt) ---
    acl is_banned src_get_gpc0(st_http_rates) gt 0
    http-request deny deny_status 403 if !is_acme is_banned

    # --- BADREQ auto-ban: ban IPs with high error rate (ACME exempt) ---
    acl has_high_error_rate sc1_http_err_rate(st_http_rates) gt 5
    http-request sc-inc-gpc0(1) if !is_acme has_high_error_rate
    http-request deny deny_status 403 if !is_acme has_high_error_rate

    # --- Rate limiting: too many requests (ACME exempt) ---
    acl http_req_rate_abuse sc1_http_req_rate(st_http_rates) gt 50
    http-request deny deny_status 429 if !is_acme http_req_rate_abuse

    # --- Block scanner paths (ACME exempt by definition — paths don't overlap) ---
    acl is_scanner_path path_beg -i /SDK/webLanguage
    acl is_scanner_path path_beg -i /hudson
    acl is_scanner_path path_beg -i /wp-admin
    acl is_scanner_path path_beg -i /wp-login
    acl is_scanner_path path_beg -i /wp-content
    acl is_scanner_path path_beg -i /wp-includes
    acl is_scanner_path path_beg -i /xmlrpc.php
    acl is_scanner_path path_beg -i /phpmyadmin
    acl is_scanner_path path_beg -i /pma
    acl is_scanner_path path_beg -i /administrator
    acl is_scanner_path path_beg -i /cgi-bin
    acl is_scanner_path path_beg -i /.env
    acl is_scanner_path path_beg -i /.git
    acl is_scanner_path path_beg -i /vendor
    acl is_scanner_path path_beg -i /telescope
    acl is_scanner_path path_beg -i /debug
    acl is_scanner_path path_beg -i /console
    acl is_scanner_path path_beg -i /solr
    acl is_scanner_path path_beg -i /manager
    acl is_scanner_path path_beg -i /jmx-console
    acl is_scanner_path path_beg -i /invoker
    acl is_scanner_path path_beg -i /jenkins
    acl is_scanner_path path_beg -i /actuator
    acl is_scanner_path path_beg -i /api/v1/pods
    acl is_scanner_path path_beg -i /remote/fgt_lang
    acl is_scanner_path path_beg -i /boaform
    acl is_scanner_path path_beg -i /HNAP1
    acl is_scanner_path path_beg -i /config
    acl is_scanner_path path_beg -i /admin

    # Ban scanner IPs (increment gpc0 → banned for 30min via stick-table expire)
    http-request sc-inc-gpc0(1) if !is_acme is_scanner_path
    http-request deny deny_status 403 if !is_acme is_scanner_path

    # --- Route ACME to certbot ---
    use_backend bk_certbot if is_acme

    default_backend bk_http_redirect

# ============================================================
# Frontend: Minecraft (port 25565) — geo-filtered
# ============================================================

frontend ft_minecraft
    bind *:25565
    mode tcp
    option tcplog

    # --- Manual IP blacklist ---
    acl is_blacklisted_mc src -f /usr/local/etc/haproxy/blacklist/blocked_ips.lst
    tcp-request connection reject if is_blacklisted_mc

    tcp-request connection track-sc0 src table st_tcp_rates

    acl tcp_conn_rate_abuse sc0_conn_rate(st_tcp_rates) gt 10
    tcp-request connection reject if tcp_conn_rate_abuse

    acl is_russian_ip_mc src -f /usr/local/etc/haproxy/geoip/ru_networks.lst
    tcp-request connection reject if !is_russian_ip_mc

    default_backend bk_minecraft

# ============================================================
# Frontend: Minecraft RCON (port 25575) — geo-filtered, strict
# ============================================================

frontend ft_minecraft_rcon
    bind *:25575
    mode tcp
    option tcplog

    # --- Manual IP blacklist ---
    acl is_blacklisted_rcon src -f /usr/local/etc/haproxy/blacklist/blocked_ips.lst
    tcp-request connection reject if is_blacklisted_rcon

    tcp-request connection track-sc0 src table st_tcp_rates

    acl tcp_conn_rate_abuse_rcon sc0_conn_rate(st_tcp_rates) gt 5
    tcp-request connection reject if tcp_conn_rate_abuse_rcon

    acl is_russian_ip_rcon src -f /usr/local/etc/haproxy/geoip/ru_networks.lst
    tcp-request connection reject if !is_russian_ip_rcon

    default_backend bk_minecraft_rcon

# ============================================================
# Frontend: VPN Alternative SSL (port 992)
# ============================================================

frontend ft_vpn_alt
    bind *:992
    mode tcp
    option tcplog

    acl is_blacklisted_vpn_alt src -f /usr/local/etc/haproxy/blacklist/blocked_ips.lst
    tcp-request connection reject if is_blacklisted_vpn_alt

    tcp-request connection track-sc0 src table st_tcp_rates

    acl tcp_conn_rate_abuse_vpn_alt sc0_conn_rate(st_tcp_rates) gt 30
    tcp-request connection reject if tcp_conn_rate_abuse_vpn_alt

    default_backend bk_vpn_alt

# ============================================================
# Frontend: VPN Server Manager GUI (port 5555) — IP-filtered
# ============================================================

frontend ft_vpn_mgmt
    bind *:5555
    mode tcp
    option tcplog

    acl is_blacklisted_mgmt src -f /usr/local/etc/haproxy/blacklist/blocked_ips.lst
    tcp-request connection reject if is_blacklisted_mgmt

    acl is_mgmt_allowed src -f /usr/local/etc/haproxy/blacklist/vpn_mgmt_ips.lst
    tcp-request connection reject if !is_mgmt_allowed

    default_backend bk_vpn_mgmt

# ============================================================
# Backends
# ============================================================

backend bk_web
    mode tcp
    balance roundrobin
    option tcp-check
    server nginx 127.0.0.1:8443 check

backend bk_vpn
    mode tcp
    balance roundrobin
    option tcp-check
    server softether 172.20.0.2:443 check inter 5s fall 3 rise 2

backend bk_vpn_alt
    mode tcp
    balance roundrobin
    option tcp-check
    server softether_alt 172.20.0.2:992 check inter 5s fall 3 rise 2

backend bk_vpn_mgmt
    mode tcp
    option tcp-check
    server softether_mgmt 172.20.0.2:5555 check inter 5s fall 3 rise 2

backend bk_http_redirect
    mode http
    http-request redirect scheme https code 301

backend bk_certbot
    mode http
    server certbot 127.0.0.1:8080 check

backend bk_minecraft
    mode tcp
    balance roundrobin
    option tcp-check
    server minecraft mainserv01.netcraze.pro:25565 check inter 5s fall 3 rise 2

backend bk_minecraft_rcon
    mode tcp
    balance roundrobin
    option tcp-check
    server minecraft_rcon mainserv01.netcraze.pro:25575 check inter 5s fall 3 rise 2

# ============================================================
# Stats (local only)
# ============================================================

listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
