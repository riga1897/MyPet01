global
    log stdout format raw local0
    maxconn 4096
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    retries 3

frontend ft_ssl
    bind *:443
    mode tcp
    option tcplog

    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    acl is_vpn req_ssl_sni -i vpn.mine-craft.su
    acl is_web req_ssl_sni -i www.mine-craft.su
    acl is_site req_ssl_sni -i site.mine-craft.su

    use_backend bk_vpn if is_vpn
    use_backend bk_web if is_web
    use_backend bk_web if is_site

    default_backend bk_web

frontend ft_http
    bind *:80
    mode http
    option httplog

    acl is_acme path_beg /.well-known/acme-challenge/

    use_backend bk_certbot if is_acme
    default_backend bk_http_redirect

backend bk_web
    mode tcp
    balance roundrobin
    option tcp-check
    server nginx nginx:8443 check

backend bk_vpn
    mode tcp
    balance roundrobin
    option tcp-check
    server softether softether:443 check

backend bk_http_redirect
    mode http
    http-request redirect scheme https code 301

backend bk_certbot
    mode http
    server certbot nginx:80 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
