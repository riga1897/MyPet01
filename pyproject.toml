[project]
name = "mypet01"
version = "0.1.0"
description = "Site for family"
authors = [
    {name = "riga1897", email = "riga1897@yandex.ru"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "django>=5.2.7",
    "djangorestframework>=3.16.1",
    "djangorestframework-simplejwt>=5.5.1",
    "drf-spectacular>=0.29.0",
    "django-filter>=25.2",
    "django-cors-headers>=4.9.0",
    "django-celery-beat>=2.8.1",
    "celery>=5.6.0rc2",
    "redis>=7.0.0",
    "psycopg2-binary>=2.9.10",
    "dj-database-url>=3.0.1",
    "python-dotenv>=1.2.1",
    "pillow>=12.0.0",
    "requests>=2.32.4",
    "gunicorn>=23.0.0",
    "stripe>=14.0.1"
]

[tool.poetry]
packages = [{include = "mypet_project"}]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0.1"
pytest-django = "^4.11.1"
pytest-mock = "^3.15.0"
pytest-cov = "^7.0.0"
pytest-xdist = "^3.8.0"
pytest-env = "^1.1.5"
factory-boy = "^3.3.1"
ipython = "^9.6.0"
black = "^25.1.0"
isort = "^7.0.0"
ruff = "^0.14.2"
mypy = "^1.17.1"
flake8 = "^7.3.0"
types-django-filter = "^25.2.0.20251010"
pre-commit = "^4.3.0"
django-stubs = "^5.2.5"
djangorestframework-stubs = "^3.16.5"

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"
