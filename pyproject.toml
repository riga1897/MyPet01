[project]
name = "mypet01"
version = "0.1.0"
description = "Site for family"
authors = [
    {name = "riga1897", email = "riga1897@yandex.ru"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "django>=5.2.7",
    "djangorestframework>=3.16.1",
    "psycopg2-binary>=2.9.10",
    "python-dotenv>=1.2.1"
]

[tool.poetry]
packages = [{include = "mypet_project"}]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0.1"
pytest-django = "^4.11.1"
black = "^25.1.0"
ruff = "^0.14.2"

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"
