[tool.poetry]
name = "mypet01"
version = "0.1.0"
description = "Site for family"
authors = ["riga1897 <riga1897@yandex.ru>"]
readme = "README.md"
packages = [{include = "mypet_project"}]

[tool.poetry.dependencies]
python = "^3.12"
django = ">=5.1"
djangorestframework = "*"
psycopg2-binary = "*"
python-dotenv = "*"
django-environ = "^0.12.0"

[tool.poetry.group.dev.dependencies]
pytest = "*"
pytest-django = "*"
black = "*"
ruff = "*"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
