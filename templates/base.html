{% load static %}
<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Гармония Души — блог о йоге и эфирных маслах. Практики для здоровья тела и души, советы по ароматерапии.{% endblock %}">
    <meta name="keywords" content="йога, эфирные масла, ароматерапия, медитация, здоровье, гармония">
    <meta name="author" content="Гармония Души">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="{% block og_title %}Гармония Души — Йога и Эфирные масла{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Практики йоги и секреты ароматерапии для гармонии тела и души{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ru_RU">
    <meta property="og:site_name" content="Гармония Души">
    {% block og_image %}<meta property="og:image" content="">{% endblock %}
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Гармония Души — Йога и Эфирные масла">
    <meta name="twitter:description" content="Практики йоги и секреты ароматерапии для гармонии тела и души">
    
    {% block canonical %}{% endblock %}
    
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon.png' %}">
    
    <title>{% block title %}Гармония Души{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.classList.remove('light', 'dark');
            document.documentElement.classList.add(theme);
        })();
        
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            html.classList.remove('light', 'dark');
            const newTheme = isDark ? 'light' : 'dark';
            html.classList.add(newTheme);
            localStorage.setItem('theme', newTheme);
        }
        
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const openIcon = document.getElementById('menu-open-icon');
            const closeIcon = document.getElementById('menu-close-icon');
            
            if (menu) menu.classList.toggle('hidden');
            if (openIcon) openIcon.classList.toggle('hidden');
            if (closeIcon) closeIcon.classList.toggle('hidden');
        }
    </script>
</head>
<body class="min-h-screen">
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
