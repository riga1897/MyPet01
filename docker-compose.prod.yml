services:
  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"
      - "25565:25565"
      - "25575:25575"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - nginx
      - softether
    restart: unless-stopped
    networks:
      - frontend

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 2 mypet_project.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DJANGO_ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - frontend

  nginx:
    image: nginx:alpine
    expose:
      - "80"
      - "8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - frontend

  softether:
    image: softethervpn/vpnserver:stable
    cap_add:
      - NET_ADMIN
    expose:
      - "443"
      - "992"
      - "5555"
    ports:
      - "992:992/tcp"
      - "5555:5555/tcp"
      - "500:500/udp"
      - "4500:4500/udp"
      - "1701:1701/udp"
      - "1194:1194/udp"
    volumes:
      - softether_data:/var/lib/softether
      - softether_logs:/var/log/softether
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      - frontend

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  softether_data:
  softether_logs:
