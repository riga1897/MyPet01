services:
  haproxy:
    image: haproxy:2.9-alpine
    network_mode: host
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - nginx
      - softether
    restart: unless-stopped

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-local/mypet01}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 2 mypet_project.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  nginx:
    image: nginx:alpine
    entrypoint: ["/docker-entrypoint-custom.sh"]
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./nginx/ssl-dhparams.pem:/etc/nginx/ssl-dhparams.pem:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - backend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./nginx/ssl:/ssl-copy
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook \"cp /etc/letsencrypt/live/www.mine-craft.su/fullchain.pem /ssl-copy/fullchain.pem && cp /etc/letsencrypt/live/www.mine-craft.su/privkey.pem /ssl-copy/privkey.pem\"; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  softether:
    image: softethervpn/vpnserver:stable
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:4443:443"
      - "992:992/tcp"
      - "5555:5555/tcp"
      - "500:500/udp"
      - "4500:4500/udp"
      - "1701:1701/udp"
      - "1194:1194/udp"
    volumes:
      - softether_data:/var/lib/softether
      - softether_logs:/var/log/softether
      - ./nginx/ssl:/etc/ssl/vpn:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  softether_data:
  softether_logs:
  certbot_conf:
  certbot_www:
