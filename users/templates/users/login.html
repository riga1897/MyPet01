{% extends "base.html" %}

{% block title %}Вход — Гармония Души{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-card rounded-2xl shadow-lg p-8 w-full max-w-md">
        <h1 class="text-2xl font-semibold text-foreground text-center mb-6">Вход в систему</h1>
        
        {% if form.errors %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
            Неверное имя пользователя или пароль.
        </div>
        {% endif %}
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="id_username" class="block text-sm font-medium text-foreground mb-1">
                    Имя пользователя
                </label>
                <input type="text" name="username" id="id_username" required autofocus
                    class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            
            <div>
                <label for="id_password" class="block text-sm font-medium text-foreground mb-1">
                    Пароль
                </label>
                <input type="password" name="password" id="id_password" required
                    class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
            </div>
            
            <button type="submit" 
                class="w-full bg-primary text-primary-foreground py-2 px-4 rounded-lg hover:bg-primary/90 transition-colors">
                Войти
            </button>
        </form>
        
        <p class="text-center text-muted-foreground mt-4">
            <a href="/" class="text-primary hover:underline">← Вернуться на главную</a>
        </p>
    </div>
</div>
{% endblock %}
