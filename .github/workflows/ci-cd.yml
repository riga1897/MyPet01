name: MyPet01 CI/CD Pipeline

on:
  push:
    branches: ['release/*', 'main']
  pull_request:
    branches: ['release/*']

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'test-secret-key-for-ci' }}
      DEBUG: 'False'
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev postgresql-client redis-tools

      - name: Install Python dependencies
        run: poetry install --no-root

      - name: Wait for databases
        run: |
          until pg_isready -h localhost -p 5432; do sleep 2; done
          until redis-cli -h localhost ping | grep -q PONG; do sleep 2; done

      - name: Run migrations
        run: poetry run python manage.py migrate --noinput

      - name: Run Pytest tests with coverage
        run: |
          poetry run pytest --cov=blog --cov=users --cov=core --cov-report=html -v

      - name: Generate coverage report
        run: |
          poetry run coverage report --fail-under=100

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/heads/release/')

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-linting
      DEBUG: 'False'
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry virtualenv
        uses: actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-lint-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-lint-

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run linters (parallel)
        run: |
          echo "Running all linters in parallel..."

          poetry run ruff check . &
          RUFF_PID=$!

          poetry run mypy . &
          MYPY_PID=$!

          wait $RUFF_PID
          RUFF_EXIT=$?

          wait $MYPY_PID
          MYPY_EXIT=$?

          echo ""
          echo "=== Linting Results ==="

          FAILED=0

          if [ $RUFF_EXIT -ne 0 ]; then
            echo "Ruff check failed"
            FAILED=1
          else
            echo "Ruff check passed"
          fi

          if [ $MYPY_EXIT -ne 0 ]; then
            echo "Mypy check failed"
            FAILED=1
          else
            echo "Mypy check passed"
          fi

          exit $FAILED

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: |
      always() &&
      github.event_name == 'push' &&
      (
        (startsWith(github.ref, 'refs/heads/release/') && needs.test.result == 'success' && needs.lint.result == 'success') ||
        (github.ref == 'refs/heads/main' && needs.test.result == 'skipped' && needs.lint.result == 'skipped')
      )
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare repository name (lowercase)
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=preprod-latest,enable=${{ startsWith(github.ref, 'refs/heads/release/') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Image built and pushed: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deploy environment
        id: env
        run: |
          if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            echo "name=preprod" >> $GITHUB_OUTPUT
            echo "image_tag=preprod-latest" >> $GITHUB_OUTPUT
            echo "sleep_time=30" >> $GITHUB_OUTPUT
            echo "env_generator=generate-preprod-env.sh" >> $GITHUB_OUTPUT
            echo "certbot_staging=${{ vars.CERTBOT_STAGING || '0' }}" >> $GITHUB_OUTPUT
            echo "load_demo_data=${{ vars.LOAD_DEMO_DATA || 'false' }}" >> $GITHUB_OUTPUT
          else
            echo "name=production" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "sleep_time=45" >> $GITHUB_OUTPUT
            echo "env_generator=generate-production-env.sh" >> $GITHUB_OUTPUT
            echo "certbot_staging=0" >> $GITHUB_OUTPUT
            echo "load_demo_data=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify required secrets
        run: |
          if [[ "${{ steps.env.outputs.name }}" == "preprod" ]]; then
            if [[ -z "${{ secrets.PREPROD_SSH_KEY }}" || -z "${{ secrets.PREPROD_SERVER_IP }}" || -z "${{ secrets.PREPROD_DEPLOY_DIR }}" ]]; then
              echo "::error::Missing PREPROD_* secrets for preprod deployment"
              exit 1
            fi
          else
            if [[ -z "${{ secrets.SSH_KEY }}" || -z "${{ secrets.SERVER_IP }}" || -z "${{ secrets.DEPLOY_DIR }}" ]]; then
              echo "::error::Missing SSH_KEY/SERVER_IP/DEPLOY_DIR secrets for production deployment"
              exit 1
            fi
          fi
          echo "Required secrets verified for ${{ steps.env.outputs.name }}"

      - name: Prepare repository name (lowercase)
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_SSH_KEY || secrets.SSH_KEY }}

      - name: Setup VPS infrastructure (if needed)
        env:
          SSH_TARGET: ${{ steps.env.outputs.name == 'preprod' && format('{0}@{1}', secrets.PREPROD_SSH_USER, secrets.PREPROD_SERVER_IP) || format('{0}@{1}', secrets.SSH_USER, secrets.SERVER_IP) }}
          DEPLOY_DIR: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_DEPLOY_DIR || secrets.DEPLOY_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_TARGET << EOFDEPS
            set -e

            echo '=== Checking VPS infrastructure ==='

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo 'Creating deploy directory...'
              sudo mkdir -p $DEPLOY_DIR
              sudo chown -R \$USER:\$USER $DEPLOY_DIR
              echo 'Deploy directory created'
            fi

            if ! command -v ufw &> /dev/null; then
              echo 'Installing UFW...'
              sudo apt-get update
              sudo apt-get install -y ufw
            fi

            if sudo ufw status | grep -q "inactive"; then
              echo 'Configuring firewall...'
              sudo ufw default deny incoming
              sudo ufw default allow outgoing
              sudo ufw allow 22/tcp
              sudo ufw allow 80/tcp
              sudo ufw allow 443/tcp
              sudo ufw allow 992/tcp
              sudo ufw allow 5555/tcp
              sudo ufw allow 500/udp
              sudo ufw allow 4500/udp
              sudo ufw allow 1701/udp
              sudo ufw allow 1194/udp
              echo 'y' | sudo ufw enable
              echo 'Firewall configured'
            else
              echo 'Firewall already active'
            fi

            if ! command -v fail2ban-client &> /dev/null; then
              echo 'Installing fail2ban...'
              sudo apt-get update
              sudo apt-get install -y fail2ban
              sudo systemctl enable fail2ban
              sudo systemctl start fail2ban
              echo 'Fail2ban installed'
            else
              echo 'Fail2ban already installed'
            fi

            if ! command -v docker &> /dev/null; then
              echo 'Installing Docker...'
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                \$(. /etc/os-release && echo "\$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker \$USER
              echo 'Docker installed!'
            else
              echo 'Docker already installed'
            fi

            if ! docker compose version &> /dev/null; then
              echo 'Installing Docker Compose v2...'
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            if ! grep -q 'net.ipv4.ip_unprivileged_port_start=0' /etc/sysctl.conf 2>/dev/null; then
              echo 'Configuring unprivileged port binding...'
              echo 'net.ipv4.ip_unprivileged_port_start=0' | sudo tee -a /etc/sysctl.conf
              sudo sysctl -p
              echo 'Unprivileged port binding configured'
            else
              echo 'Unprivileged port binding already configured'
            fi

            echo '=== VPS infrastructure ready ==='
          EOFDEPS

      - name: Copy files to server
        env:
          SSH_TARGET: ${{ steps.env.outputs.name == 'preprod' && format('{0}@{1}', secrets.PREPROD_SSH_USER, secrets.PREPROD_SERVER_IP) || format('{0}@{1}', secrets.SSH_USER, secrets.SERVER_IP) }}
          DEPLOY_DIR: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_DEPLOY_DIR || secrets.DEPLOY_DIR }}
          ENV_GENERATOR: ${{ steps.env.outputs.env_generator }}
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            $SSH_TARGET:$DEPLOY_DIR/

          scp -o StrictHostKeyChecking=no \
            -r nginx haproxy \
            $SSH_TARGET:$DEPLOY_DIR/

          scp -o StrictHostKeyChecking=no \
            scripts/$ENV_GENERATOR \
            scripts/init-letsencrypt.sh \
            $SSH_TARGET:$DEPLOY_DIR/

      - name: Generate .env and deploy
        env:
          SSH_TARGET: ${{ steps.env.outputs.name == 'preprod' && format('{0}@{1}', secrets.PREPROD_SSH_USER, secrets.PREPROD_SERVER_IP) || format('{0}@{1}', secrets.SSH_USER, secrets.SERVER_IP) }}
          DEPLOY_DIR: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_DEPLOY_DIR || secrets.DEPLOY_DIR }}
          SERVER_IP: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_SERVER_IP || secrets.SERVER_IP }}
          IMAGE_TAG: ${{ steps.env.outputs.image_tag }}
          ENV_GENERATOR: ${{ steps.env.outputs.env_generator }}
          LOAD_DEMO_DATA: ${{ steps.env.outputs.load_demo_data }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_TARGET << EOFDEPLOY
            set -e
            cd $DEPLOY_DIR

            chmod +x $ENV_GENERATOR
            SERVER_IP=$SERVER_IP LOAD_DEMO_DATA=$LOAD_DEMO_DATA ./$ENV_GENERATOR

            grep -q "^IMAGE_TAG=" .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            grep -q "^GITHUB_REPOSITORY=" .env && sed -i "s|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${{ env.REPO_LOWERCASE }}|" .env || echo "GITHUB_REPOSITORY=${{ env.REPO_LOWERCASE }}" >> .env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            docker image prune -af
          EOFDEPLOY

      - name: Health check
        env:
          SSH_TARGET: ${{ steps.env.outputs.name == 'preprod' && format('{0}@{1}', secrets.PREPROD_SSH_USER, secrets.PREPROD_SERVER_IP) || format('{0}@{1}', secrets.SSH_USER, secrets.SERVER_IP) }}
          DEPLOY_DIR: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_DEPLOY_DIR || secrets.DEPLOY_DIR }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
          SLEEP_TIME: ${{ steps.env.outputs.sleep_time }}
        run: |
          echo "Waiting for services to start..."
          sleep $SLEEP_TIME

          for i in {1..12}; do
            if ssh -o StrictHostKeyChecking=no $SSH_TARGET "curl -sf http://localhost:8080/health/ || curl -sf http://localhost:8080/"; then
              echo "$DEPLOY_ENV is healthy!"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done

          echo "Health check failed!"
          ssh -o StrictHostKeyChecking=no $SSH_TARGET "cd $DEPLOY_DIR && docker compose -f docker-compose.prod.yml logs --tail=50"
          exit 1

      - name: Setup SSL certificate (if needed)
        env:
          SSH_TARGET: ${{ steps.env.outputs.name == 'preprod' && format('{0}@{1}', secrets.PREPROD_SSH_USER, secrets.PREPROD_SERVER_IP) || format('{0}@{1}', secrets.SSH_USER, secrets.SERVER_IP) }}
          DEPLOY_DIR: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_DEPLOY_DIR || secrets.DEPLOY_DIR }}
          CERTBOT_STAGING: ${{ steps.env.outputs.certbot_staging }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_TARGET << EOFSSL
            set -e
            cd $DEPLOY_DIR

            CERT_DIR="/etc/letsencrypt/live/www.mine-craft.su"
            CERT_EXISTS=\$(docker compose -f docker-compose.prod.yml exec -T nginx sh -c "
              if [ -f '\$CERT_DIR/fullchain.pem' ] && [ ! -L '\$CERT_DIR/fullchain.pem' ] && openssl x509 -in '\$CERT_DIR/fullchain.pem' -noout -issuer 2>/dev/null | grep -qv 'O=Temporary'; then
                echo 'true'
              else
                echo 'false'
              fi
            " 2>/dev/null | tail -1)

            if [ "\$CERT_EXISTS" = "true" ]; then
              echo 'Real SSL certificate already installed. Skipping.'
            else
              echo 'Real SSL certificate not found. Running init-letsencrypt...'
              chmod +x init-letsencrypt.sh
              STAGING=$CERTBOT_STAGING ./init-letsencrypt.sh --auto
            fi
          EOFSSL

      - name: Run database migrations and setup
        env:
          SSH_TARGET: ${{ steps.env.outputs.name == 'preprod' && format('{0}@{1}', secrets.PREPROD_SSH_USER, secrets.PREPROD_SERVER_IP) || format('{0}@{1}', secrets.SSH_USER, secrets.SERVER_IP) }}
          DEPLOY_DIR: ${{ steps.env.outputs.name == 'preprod' && secrets.PREPROD_DEPLOY_DIR || secrets.DEPLOY_DIR }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
          LOAD_DEMO_DATA: ${{ steps.env.outputs.load_demo_data }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_TARGET << EOFSETUP
            set -e
            cd $DEPLOY_DIR

            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput

            echo "Creating superuser if not exists..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py create_superuser_if_not_exists

            echo "Loading initial structure..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py setup_initial_structure

            if [ "$DEPLOY_ENV" = "preprod" ] && [ "$LOAD_DEMO_DATA" = "true" ]; then
              echo "Loading demo content (preprod only)..."
              docker compose -f docker-compose.prod.yml exec -T web python manage.py setup_demo_content
            fi

            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput

            echo "Setup completed!"
          EOFSETUP

      - name: Create draft PR to main (preprod only)
        if: startsWith(github.ref, 'refs/heads/release/') && vars.CREATE_PR_ON_PREDEPLOY != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          gh pr create --base main --head "$BRANCH_NAME" --title "Release to Production" --body "Automated PR from release branch $BRANCH_NAME" --draft || echo "PR already exists or cannot be created"
