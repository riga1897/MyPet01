name: MyPet01 CI/CD Pipeline

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main, 'release/*']

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'test-secret-key-for-ci' }}
      DEBUG: 'False'
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev postgresql-client redis-tools

      - name: Install Python dependencies
        run: poetry install --no-root

      - name: Wait for databases
        run: |
          until pg_isready -h localhost -p 5432; do sleep 2; done
          until redis-cli -h localhost ping | grep -q PONG; do sleep 2; done

      - name: Run migrations
        run: poetry run python manage.py migrate --noinput

      - name: Run Pytest tests with coverage
        run: |
          poetry run pytest --cov=blog --cov=users --cov=core --cov-report=html -v

      - name: Generate coverage report
        run: |
          poetry run coverage report --fail-under=100

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-linting
      DEBUG: 'False'
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry virtualenv
        uses: actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-lint-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-lint-

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run linters (parallel)
        run: |
          echo "Running all linters in parallel..."

          poetry run ruff check . &
          RUFF_PID=$!

          poetry run mypy . &
          MYPY_PID=$!

          wait $RUFF_PID
          RUFF_EXIT=$?

          wait $MYPY_PID
          MYPY_EXIT=$?

          echo ""
          echo "=== Linting Results ==="

          FAILED=0

          if [ $RUFF_EXIT -ne 0 ]; then
            echo "Ruff check failed"
            FAILED=1
          else
            echo "Ruff check passed"
          fi

          if [ $MYPY_EXIT -ne 0 ]; then
            echo "Mypy check failed"
            FAILED=1
          else
            echo "Mypy check passed"
          fi

          exit $FAILED

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare repository name (lowercase)
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preprod-latest,enable=${{ startsWith(github.ref, 'refs/heads/release/') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Image built and pushed: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy-preprod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')

    permissions:
      contents: write
      pull-requests: write

    env:
      IMAGE_TAG: preprod-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare repository name (lowercase)
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PREPROD_SSH_KEY }}

      - name: Install Docker on preprod VPS (if needed)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }} << 'EOFDEPS'
            set -e

            echo 'Checking system dependencies...'

            if ! command -v docker &> /dev/null; then
              echo 'Installing Docker...'
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

              sudo usermod -aG docker $USER
              echo 'Docker installed!'
            else
              echo 'Docker is already installed'
            fi

            if ! docker compose version &> /dev/null; then
              echo 'Installing Docker Compose v2...'
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            if [ ! -d "${{ secrets.PREPROD_DEPLOY_DIR }}" ]; then
              sudo mkdir -p ${{ secrets.PREPROD_DEPLOY_DIR }}
              sudo chown -R $USER:$USER ${{ secrets.PREPROD_DEPLOY_DIR }}
            fi

            echo 'System ready!'
          EOFDEPS

      - name: Copy files to preprod server
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }}:${{ secrets.PREPROD_DEPLOY_DIR }}/

          scp -o StrictHostKeyChecking=no \
            -r nginx haproxy \
            ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }}:${{ secrets.PREPROD_DEPLOY_DIR }}/

          scp -o StrictHostKeyChecking=no \
            scripts/generate-preprod-env.sh \
            ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }}:${{ secrets.PREPROD_DEPLOY_DIR }}/

      - name: Generate .env and deploy on preprod
        env:
          PREPROD_SERVER_IP: ${{ secrets.PREPROD_SERVER_IP }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }} << EOFDEPLOY
            set -e
            cd ${{ secrets.PREPROD_DEPLOY_DIR }}

            chmod +x generate-preprod-env.sh
            SERVER_IP=${{ secrets.PREPROD_SERVER_IP }} ./generate-preprod-env.sh

            # Update Docker image config in .env (idempotent)
            grep -q "^IMAGE_TAG=" .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=preprod-latest/" .env || echo "IMAGE_TAG=preprod-latest" >> .env
            grep -q "^GITHUB_REPOSITORY=" .env && sed -i "s|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${{ env.REPO_LOWERCASE }}|" .env || echo "GITHUB_REPOSITORY=${{ env.REPO_LOWERCASE }}" >> .env

            # Login to GHCR (token passed securely via stdin)
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            docker image prune -af
          EOFDEPLOY

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 30

          for i in {1..12}; do
            if ssh -o StrictHostKeyChecking=no ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }} "curl -sf http://localhost:8080/health/ || curl -sf http://localhost:8080/"; then
              echo "Preprod is healthy!"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done

          echo "Health check failed!"
          ssh -o StrictHostKeyChecking=no ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }} "cd ${{ secrets.PREPROD_DEPLOY_DIR }} && docker compose -f docker-compose.prod.yml logs --tail=50"
          exit 1

      - name: Run database migrations and setup
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SERVER_IP }} << 'EOFSETUP'
            set -e
            cd ${{ secrets.PREPROD_DEPLOY_DIR }}

            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput

            echo "Creating superuser if not exists..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py create_superuser_if_not_exists

            echo "Loading initial structure..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py setup_initial_structure

            echo "Loading demo content (preprod only)..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py setup_demo_content

            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput

            echo "Setup completed!"
          EOFSETUP

      - name: Create draft PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          gh pr create --base main --head "$BRANCH_NAME" --title "Release to Production" --draft || echo "PR already exists or cannot be created"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      IMAGE_TAG: latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare repository name (lowercase)
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Install Docker on production VPS (if needed)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOFDEPS'
            set -e

            echo 'Checking system dependencies...'

            if ! command -v docker &> /dev/null; then
              echo 'Installing Docker...'
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

              sudo usermod -aG docker $USER
              echo 'Docker installed!'
            else
              echo 'Docker is already installed'
            fi

            if ! docker compose version &> /dev/null; then
              echo 'Installing Docker Compose v2...'
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            if [ ! -d "${{ secrets.DEPLOY_DIR }}" ]; then
              sudo mkdir -p ${{ secrets.DEPLOY_DIR }}
              sudo chown -R $USER:$USER ${{ secrets.DEPLOY_DIR }}
            fi

            echo 'System ready!'
          EOFDEPS

      - name: Copy files to production server
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}/

          scp -o StrictHostKeyChecking=no \
            -r nginx haproxy \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}/

          scp -o StrictHostKeyChecking=no \
            scripts/generate-production-env.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}/

      - name: Generate .env and deploy on production
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << EOFDEPLOY
            set -e
            cd ${{ secrets.DEPLOY_DIR }}

            chmod +x generate-production-env.sh
            SERVER_IP=${{ secrets.SERVER_IP }} ./generate-production-env.sh

            # Update Docker image config in .env (idempotent)
            grep -q "^IMAGE_TAG=" .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=latest/" .env || echo "IMAGE_TAG=latest" >> .env
            grep -q "^GITHUB_REPOSITORY=" .env && sed -i "s|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${{ env.REPO_LOWERCASE }}|" .env || echo "GITHUB_REPOSITORY=${{ env.REPO_LOWERCASE }}" >> .env

            # Login to GHCR (token passed securely via stdin)
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            docker image prune -af
          EOFDEPLOY

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 45

          for i in {1..12}; do
            if ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "curl -sf http://localhost:8080/health/ || curl -sf http://localhost:8080/"; then
              echo "Production is healthy!"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done

          echo "Health check failed!"
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "cd ${{ secrets.DEPLOY_DIR }} && docker compose -f docker-compose.prod.yml logs --tail=50"
          exit 1

      - name: Run database migrations and setup
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOFSETUP'
            set -e
            cd ${{ secrets.DEPLOY_DIR }}

            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput

            echo "Creating superuser if not exists..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py create_superuser_if_not_exists

            echo "Loading initial structure..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py setup_initial_structure

            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput

            echo "Setup completed!"
          EOFSETUP
