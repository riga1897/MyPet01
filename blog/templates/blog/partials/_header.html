<header class="sticky top-0 z-50 w-full border-b border-border bg-background/95 backdrop-blur" style="background-color: rgba(249, 250, 250, 0.95);">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-2 text-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 7.5a4.5 4.5 0 1 1 4.5 4.5M12 7.5A4.5 4.5 0 1 0 7.5 12M12 7.5V9m-4.5 3a4.5 4.5 0 1 0 4.5 4.5M7.5 12H9m7.5 0a4.5 4.5 0 1 1-4.5 4.5m4.5-4.5H15m-3 4.5V15"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl">Гармония Души</h1>
                    <p class="text-xs text-muted-foreground">Йога & Эфирные масла</p>
                </div>
            </div>
            
            <nav class="hidden md:flex items-center gap-6">
                <a href="{% url 'blog:index' %}" class="transition-colors hover:text-primary">Главная</a>
                <a href="{% url 'blog:index' %}#about" class="transition-colors hover:text-primary">О блоге</a>
                
                {% if user.is_authenticated %}
                    {% if is_moderator %}
                    <a href="{% url 'blog:content_list' %}" class="transition-colors hover:text-primary">Контент</a>
                    <a href="{% url 'users:moderator_list' %}" class="transition-colors hover:text-primary">Модераторы</a>
                    {% endif %}
                    <span class="text-muted-foreground text-sm">{{ user.username }}</span>
                    <form method="post" action="{% url 'users:logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-primary hover:underline text-sm">Выйти</button>
                    </form>
                {% else %}
                    <a href="{% url 'users:login' %}" class="text-primary hover:underline">Войти</a>
                {% endif %}
            </nav>
        </div>
    </div>
</header>
