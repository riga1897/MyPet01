<div class="category-filter-dropdown relative">
    <button type="button" 
            onclick="toggleCategoryFilterDropdown(this)"
            class="dropdown-toggle">
        <span>Категории</span>
        <span id="category-filter-count" class="hidden text-xs bg-primary text-white rounded-full px-1.5">0</span>
        <svg class="dropdown-arrow w-4 h-4 transition-transform" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </button>
    
    <div class="dropdown-menu hidden">
        <label class="select-all-label flex items-center gap-2 px-3 py-2 hover:bg-muted cursor-pointer border-b border-border">
            <input type="checkbox" 
                   id="category-filter-select-all"
                   class="w-4 h-4 text-primary border-border rounded focus:ring-primary"
                   checked
                   onchange="handleCategoryFilterSelectAll(this)">
            <span class="text-sm font-medium">Выбрать все</span>
        </label>
        
        {% for cat in categories %}
        <label class="category-filter-checkbox-label flex items-center gap-2 px-3 py-1.5 hover:bg-muted cursor-pointer"
               data-category-code="{{ cat.code }}">
            <input type="checkbox" 
                   class="category-filter-checkbox w-4 h-4 text-primary border-border rounded focus:ring-primary"
                   data-category-code="{{ cat.code }}"
                   checked
                   onchange="handleCategoryFilterCheckboxChange(this)">
            <span class="text-sm">{{ cat.name }}</span>
        </label>
        {% endfor %}
    </div>
</div>
