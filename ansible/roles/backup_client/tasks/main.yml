---
- name: Установить зависимости бэкап-клиента
  apt:
    name:
      - rsync
      - python3
      - python3-pip
    state: present
    update_cache: true

- name: Установить boto3 для S3
  pip:
    name:
      - boto3
      - requests
    state: present

- name: Создать директорию скриптов
  file:
    path: /opt/scripts
    state: directory
    mode: "0755"

- name: Скопировать backup.py
  copy:
    src: "{{ playbook_dir }}/../scripts/backup.py"
    dest: /opt/scripts/backup.py
    mode: "0750"

- name: Скопировать конфиг backup (.env)
  template:
    src: backup.env.j2
    dest: /opt/scripts/backup.env
    mode: "0600"

- name: Настроить cron для ежедневных бэкапов
  cron:
    name: "Ежедневный бэкап MyPet01"
    cron_file: mypet01-backup
    user: root
    job: "python3 /opt/scripts/backup.py >> /var/log/mypet01-backup.log 2>&1"
    hour: "2"
    minute: "0"
