---
- name: Установить зависимости Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
    state: present
    update_cache: true

- name: Добавить GPG ключ Docker
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Добавить репозиторий Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present

- name: Установить Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Запустить и включить Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Установить docker-compose (standalone)
  get_url:
    url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
    dest: /usr/local/bin/docker-compose
    mode: "0755"

- name: Установить Python-пакет docker (для Ansible)
  pip:
    name: docker
    state: present
