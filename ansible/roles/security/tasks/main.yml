---
- name: Установить fail2ban и ufw
  apt:
    name:
      - fail2ban
      - ufw
    state: present
    update_cache: true

# --- ufw ---
- name: Сбросить ufw в дефолт
  ufw:
    state: reset

- name: Запретить входящий трафик по умолчанию
  ufw:
    default: deny
    direction: incoming

- name: Разрешить исходящий трафик
  ufw:
    default: allow
    direction: outgoing

- name: Разрешить нужные порты
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ ufw_allowed_ports }}"

- name: Включить ufw
  ufw:
    state: enabled

# --- SSH — только ключи ---
- name: Запретить вход по паролю SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: restart sshd

- name: Запретить root-вход по паролю
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin prohibit-password"
    state: present
  notify: restart sshd

# --- fail2ban ---
- name: Скопировать конфиг fail2ban jail.local
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban

- name: Скопировать фильтр для Nginx (X-Forwarded-For)
  template:
    src: nginx-req-limit.conf.j2
    dest: /etc/fail2ban/filter.d/nginx-req-limit.conf
    mode: "0644"
  when: "'prod' in group_names"
  notify: restart fail2ban

- name: Запустить и включить fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: true

# --- ICMP блокировка (только VPS1) ---
- name: Отключить ответы на ping (VPS1)
  sysctl:
    name: net.ipv4.icmp_echo_ignore_all
    value: "1"
    state: present
    reload: true
  when: "'prod' in group_names"
